# Production Docker Compose Override
# Use with: docker compose -f docker-compose.yml -f docker-compose.production.yml up

version: '3.9'

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports: []  # Disable port exposure
    restart: always

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports: []  # Disable port exposure (internal only)
    restart: always

  m1:
    ports: []  # Remove port exposure, use nginx proxy
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}

  m2:
    ports: []
    restart: always

  scanner-engine:
    ports: []
    restart: always

  m4:
    ports: []
    restart: always

  m5:
    ports: []
    restart: always
    environment:
      WAZUH_API_URL: ${WAZUH_API_URL}
      WAZUH_PASSWORD: ${WAZUH_PASSWORD}

  m7:
    ports: []
    restart: always

  m8:
    ports: []
    restart: always

  orchestrator:
    ports: []
    restart: always
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      PLATFORM_URL: ${PLATFORM_URL}

  # Nginx (exposed on 80/443)
  nginx:
    ports:
      - "80:80"
      - "443:443"
    restart: always
    environment:
      SERVER_NAME: ${PLATFORM_URL#https://}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./ssl:/etc/nginx/ssl:ro

  celery-worker:
    restart: always
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      PLATFORM_URL: ${PLATFORM_URL}

  celery-beat:
    restart: always
    environment:
      PLATFORM_URL: ${PLATFORM_URL}

volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
