id: custom-sql-injection-error
info:
  name: SQL Injection Error Disclosure
  author: scanops
  description: Detecta mensajes de error SQL en la respuesta al inyectar una comilla, indicio de SQL injection.
  severity: high
  tags: [custom, injection, sqli, owasp]
http:
  - method: GET
    path:
      - "{{BaseURL}}/?id=1'"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "SQL syntax"
          - "mysql_fetch"
          - "ORA-01756"
          - "Unclosed quotation mark"
          - "SQLSTATE"
          - "pg_query"
        condition: or
      - type: status
        status: [200, 500]

---
id: custom-xxe-probe
info:
  name: XML External Entity (XXE) Probe
  author: scanops
  description: Comprueba si un endpoint XML refleja el contenido de una entidad externa definida en el cuerpo.
  severity: high
  tags: [custom, xxe, owasp, xml]
http:
  - raw:
      - |
        POST /api/parse HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/xml

        <?xml version="1.0"?><!DOCTYPE r [<!ENTITY x "scanops-xxe-canary">]><r>&x;</r>
    matchers:
      - type: word
        part: body
        words:
          - "scanops-xxe-canary"
