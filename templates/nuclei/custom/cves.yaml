id: cve-2024-xxe
info:
  name: XML External Entity (XXE) CVE-2024-YYYY
  description: XXE vulnerability in XML parser
  severity: high
  tags: [cve, xxe, owasp, xml]
http:
  - method: POST
    path: /api/parse
    matchers:
      - type: status
        status: [200]

