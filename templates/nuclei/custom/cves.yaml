id: cve-2024-sql-injection
info:
  name: SQL Injection CVE-2024-XXXX
  description: Potential SQL injection vulnerability
  severity: critical
  tags: [cve, injection, owasp, sql]
http:
  - method: GET
    path: /?id=1' OR '1'='1
    matchers:
      - type: status
        status: [200]

