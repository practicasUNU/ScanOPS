version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: scanops
      POSTGRES_PASSWORD: scanops
      POSTGRES_DB: scanops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  vault:
    image: hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"

  asset-manager:
    build: .
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://redis:6379/0
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-token
    depends_on:
      - postgres
      - redis
      - vault

  celery-worker:
    build: .
    command: celery -A shared.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://redis:6379/0
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-token
    depends_on:
      - postgres
      - redis
      - vault

volumes:
  pgdata: