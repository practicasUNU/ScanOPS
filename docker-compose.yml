networks:
  scanops:
    driver: bridge
  scanops_honeypot_net:
    driver: bridge
    internal: false

services:
  postgres:
    image: postgres:16
    container_name: scanops-postgres
    environment:
      POSTGRES_USER: scanops
      POSTGRES_PASSWORD: scanops
      POSTGRES_DB: scanops
      JWT_SECRET_KEY: "scanops-secret-ens-alto-2026"
  # ports:
    #  - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - scanops
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U scanops" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scanops-redis
    ports:
      - "6379:6379"
    networks:
      scanops:
        aliases:
          - scanops-main-redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

#  openvas:
#    image: immauss/openvas:latest
#    container_name: scanops-openvas
#    ports:
#      - "9392:9392"
#      - "9390:9390"
#    environment:
#      - USERNAME=admin
#      - PASSWORD=admin
#      - DB_PASSWORD=admin
#    volumes:
#      - openvas_data:/data
#    networks:
#      - scanops
#    restart: unless-stopped

  # services/asset_manager (M1)
  m1:
    build:
      context: .
      dockerfile: Dockerfile.asset
    container_name: scanops-m1
    ports:
      - "8001:8001"
    command: uvicorn services.asset_manager.main:app --host 0.0.0.0 --port 8001
    environment:
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://scanops-main-redis:6379/0
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: "myroot"
      JWT_SECRET_KEY: "scanops-secret-ens-alto-2026"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - scanops

  celery-worker:
    build: .
    container_name: scanops-celery-worker
    command: celery -A shared.celery_app worker --loglevel=info --pool=threads --concurrency=10 -Q discovery,vulnerabilities,heavy_scans,scanner_tasks,scanner_orchestrator,celery,ai_reasoning,exploitation,reporting
    environment:
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://scanops-main-redis:6379/0
      ZAP_HOST: scanops-zap
      ZAP_PORT: 8080
      OLLAMA_MODEL: "mistral:7b"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_POST_EXPLOIT_MODEL: "qwen2.5:14b"
      JWT_SECRET_KEY: "scanops-secret-ens-alto-2026"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      PLATFORM_URL: ${PLATFORM_URL:-https://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanops

  celery-beat:
    build: .
    container_name: scanops-celery-beat
    command: celery -A shared.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    environment:
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://scanops-main-redis:6379/0
      JWT_SECRET_KEY: "scanops-secret-ens-alto-2026"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      PLATFORM_URL: ${PLATFORM_URL:-https://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanops
    restart: unless-stopped

  m2:
    build:
      context: .
      dockerfile: Dockerfile.m2
    container_name: scanops-m2
    ports:
      - "8003:8003"
    depends_on:
      m1:
        condition: service_healthy
    environment:
      JWT_SECRET_KEY: "scanops-secret-ens-alto-2026"
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      M2_PORT: 8003
      M1_URL: http://m1:8001
      LOG_LEVEL: info
    volumes:
      - ./services/recon_engine:/app/services/recon_engine
    networks:
      - scanops
    restart: unless-stopped


  # Web-Check — OSINT capa de aplicación (ENS local, sin API pública)
  scanops-webcheck:
    image: lissy93/web-check:latest
    container_name: scanops-webcheck
    ports:
      - "3000:3000"
    networks:
      - scanops
    environment:
      - CHROME_PATH=/usr/bin/chromium
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/check"]
      interval: 30s
      timeout: 10s
      retries: 3



  # services/scanner_engine (M3)
  scanner-engine:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: scanops-scanner-engine
    ports:
      - "8002:8002"
    command: uvicorn services.scanner_engine.main:app --host 0.0.0.0 --port 8002
    environment:
      JWT_SECRET_KEY: "scanops-secret-ens-alto-2026"
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://scanops-main-redis:6379/0
      ZAP_HOST: scanops-zap
      ZAP_PORT: 8080
      ZAP_API_KEY: ""
      M1_URL: http://m1:8001
      M1_TOKEN: scanops_secret
    depends_on:
      - postgres
      - redis
    networks:
      - scanops

  trivy:
    image: aquasec/trivy:latest
    container_name: scanops-trivy
    ports:
      - "8090:8090"
    command: server --listen 0.0.0.0:8090
    networks:
      - scanops
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8090/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  #  zap:
  #    image: ghcr.io/zaproxy/zaproxy:stable
  #    container_name: scanops-zap
  #    ports:
  #      - "8080:8080"
  #    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.disablekey=true -config api.addrs.addr.name='.*' -config api.addrs.addr.regex=true
  #    volumes:
  #      - zap_data:/root/.ZAP
  #    networks:
  #      - scanops
  #    healthcheck:
  #      test: [ "CMD", "curl", "http://localhost:8080/json/core/action/version" ]
  #      interval: 30s
  #      timeout: 10s
  #      retries: 3
  #    depends_on:
  #      postgres:
  #        condition: service_healthy
  #      redis:
  #        condition: service_healthy

  # services/exploit_engine (M4)
  m4:
    build:
      context: .
      dockerfile: Dockerfile.m4
    container_name: scanops-m4
    ports:
      - "8004:8004"
    command: uvicorn services.exploit_engine.main:app --host 0.0.0.0 --port 8004
    environment:
      JWT_SECRET_KEY: "scanops-secret-ens-alto-2026"
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://scanops-main-redis:6379/0
      M4_DRY_RUN: "false"
      HYDRA_WORDLIST: "/usr/share/wordlists/rockyou.txt"
      HYDRA_THREADS: "2"
      HYDRA_TIMEOUT: "600"
      GOBUSTER_WORDLIST: "/usr/share/wordlists/common.txt"
      GOBUSTER_THREADS: "10"
      GOBUSTER_TIMEOUT: "300"
      UBUNTU_TEST_TARGET_IP: "10.202.15.100"
      UBUNTU_TEST_SSH_USER: "admin"
      NXC_TIMEOUT: 30
      NXC_THREADS: 10
      NXC_DEFAULT_DOMAIN: WORKGROUP
      KILL_SWITCH_REDIS_URL: redis://scanops-main-redis:6379/0
      MONITOR_SSH_USER: admin
      MONITOR_SSH_PASSWORD: test123
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      PLATFORM_URL: ${PLATFORM_URL:-https://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - scanops
    restart: unless-stopped

  # services/ai_reasoning (M8)
  m8:
    build:
      context: .
      dockerfile: Dockerfile.m8
    container_name: scanops-m8
    ports:
      - "8005:8005"
    command: uvicorn services.ai_reasoning.main:app --host 0.0.0.0 --port 8005
    environment:
      JWT_SECRET_KEY: "scanops-secret-ens-alto-2026"
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://scanops-main-redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: mistral:7b
      OLLAMA_POST_EXPLOIT_MODEL: qwen2.5:14b
      M3_URL: http://scanner-engine:8002
      M1_URL: http://m1:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"                                                                                                                                             
    networks:
      - scanops
    restart: unless-stopped

# --- M5: SIEM & Monitoring Foundation (US-6.1) ---
  
  # Base de Datos para Graylog
  mongodb:
    image: mongo:5.0
    container_name: scanops-mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - scanops

  # Motor de búsqueda para Graylog y Wazuh Indexer
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: scanops-opensearch
    environment:
      
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "bootstrap.memory_lock=true"
      - "discovery.type=single-node"
      - "action.auto_create_index=true"
      - "plugins.security.disabled=true"
      - "compatibility.override_main_response_version=true"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      scanops:
        aliases:
          - wazuh.indexer

  graylog:
    image: graylog/graylog:5.2
    container_name: scanops-graylog
    depends_on:
      - mongodb
      - opensearch
    ports:
      - "9000:9000"
      - "12201:12201/udp"
    environment:
      - GRAYLOG_NODE_ID=graylog-node-1
      - GRAYLOG_PASSWORD_SECRET=scanops_ens_alto_secret_2024
      - GRAYLOG_ROOT_PASSWORD_SHA2=8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
      - GRAYLOG_HTTP_BIND_ADDRESS=0.0.0.0:9000
      - GRAYLOG_HTTP_EXTERNAL_URI=http://localhost:9000/
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://opensearch:9200
      - GRAYLOG_ELASTICSEARCH_VERSION=7
      - GRAYLOG_MONGODB_URI=mongodb://mongodb:27017/graylog
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/lbstatus"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - scanops

  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.2
    container_name: scanops-wazuh
    environment:
      - INDEXER_URL=http://wazuh.indexer:9200
      - INDEXER_USER=admin
      - INDEXER_PASSWORD=admin
      - FILEBEAT_SSL_VERIFY=false
      - WAZUH_API_ADMIN_PASSWORD=wazuh
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    volumes:
      - wazuh_data:/var/ossec/data
      - scanops_suricata_logs:/var/log/suricata:ro
      - scanops_cowrie_logs:/var/log/cowrie:ro
      - scanops_beelzebub_logs:/var/log/beelzebub:ro
    networks:
      scanops:
        aliases:
          - wazuh.manager

  # M5 - SIEM Engine (FastAPI)
  m5:
    build:
      context: .
      dockerfile: Dockerfile.m5
    container_name: scanops-m5
    ports:
      - "8006:8006"
    environment:
      - DATABASE_URL=postgresql://scanops:scanops@postgres:5432/scanops
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-scanops-secret-ens-alto-2026}
      - WAZUH_API_URL=https://wazuh-manager:55000
      - WAZUH_USER=wazuh
      - WAZUH_PASSWORD=wazuh
      - GRAYLOG_API_URL=http://graylog:9000/api
      - M1_URL=http://m1:8001
      - M2_URL=http://m2:8003
      - M3_URL=http://scanner-engine:8002
      - SCANOPS_API_KEY=scanops_secret
      - WAZUH_MANAGER_IP=scanops-wazuh
      - CROWDSEC_API_URL=http://scanops-crowdsec:8080
      - CROWDSEC_BOUNCER_KEY=${CROWDSEC_BOUNCER_KEY:-}
      - INDEXER_URL=http://wazuh.indexer:9200
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=mistral:7b
      - MISP_URL=http://scanops-misp:80
      - MISP_API_KEY=${MISP_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - scanops_suricata_logs:/var/log/suricata:ro
      - scanops_cowrie_logs:/var/log/cowrie:ro
      - scanops_beelzebub_logs:/var/log/beelzebub:ro
    depends_on:
      postgres:
        condition: service_healthy
      wazuh-manager:
        condition: service_started
    networks:
      - scanops
    extra_hosts:
      - "host.docker.internal:host-gateway"
  # US-6.6 — CrowdSec IDS/IPS
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: scanops-crowdsec
    environment:
      - COLLECTIONS=crowdsecurity/linux crowdsecurity/sshd
      - GID=1000
    volumes:
      - ./config/crowdsec:/etc/crowdsec
      - scanops_crowdsec_data:/var/lib/crowdsec/data
    networks:
      - scanops
    restart: unless-stopped

# --- M7: Reporting Engine (US-7.1) ---
  m7:
    build: ./services/reporting_engine
    container_name: scanops-m7
    ports:
      - "8007:8000"
    volumes:
      - ./services/reporting_engine:/app
    environment:
      - SERVICE_NAME=M7-Reporting
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-scanops-secret-ens-alto-2026}
      - DATABASE_URL=postgresql://scanops:scanops@scanops-postgres:5432/scanops
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - PLATFORM_URL=${PLATFORM_URL:-https://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scanops




  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: scanops-orchestrator
    ports:
      - "8009:8009"
    environment:
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://scanops-main-redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-scanops-secret-ens-alto-2026}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      PLATFORM_URL: ${PLATFORM_URL:-https://localhost:5173}
      M1_URL: http://m1:8001
      M2_URL: http://m2:8003
      M3_URL: http://scanner-engine:8002
      M4_URL: http://m4:8004
      M5_URL: http://m5:8006
      M7_URL: http://m7:8000
      M8_URL: http://m8:8005
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanops
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: scanops-telegram-bot
    command: python services/orchestrator/telegram_bot.py
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      PLATFORM_URL: ${PLATFORM_URL:-https://localhost:5173}
      ORCHESTRATOR_INTERNAL_URL: http://orchestrator:8009
    depends_on:
      - orchestrator
    networks:
      - scanops
    restart: unless-stopped

  # US-6.4 — Honeypot SSH/Telnet (Cowrie)
  cowrie:
    image: cowrie/cowrie:latest
    container_name: scanops-cowrie
    ports:
      - "2222:2222"
      - "2223:2223"
    volumes:
      - scanops_cowrie_logs:/cowrie/cowrie-git/var/log/cowrie
    networks:
      - scanops_honeypot_net
    restart: unless-stopped


  # Frontend (React + Vite served with Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: scanops-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - scanops
    restart: unless-stopped

volumes:
  pgdata:
  trivy_data:
  zap_data:
  #openvas_data:
  mongodb_data:
  opensearch_data:
  wazuh_data:
  scanops_crowdsec_data:
  scanops_suricata_logs:
    name: scanops_suricata_logs
  scanops_suricata_rules:
    name: scanops_suricata_rules
  scanops_cowrie_logs:
    name: scanops_cowrie_logs
  scanops_beelzebub_logs:
    name: scanops_beelzebub_logs




