networks:
  scanops:
    driver: bridge

services:
  postgres:
    image: postgres:16
    container_name: scanops-postgres
    environment:
      POSTGRES_USER: scanops
      POSTGRES_PASSWORD: scanops
      POSTGRES_DB: scanops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - scanops
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U scanops" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scanops-redis
    ports:
      - "6379:6379"
    networks:
      - scanops
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # services/asset_manager (M1)
  m1:
    build:
      context: .
      dockerfile: Dockerfile.asset
    container_name: scanops-m1
    ports:
      - "8001:8001"
    command: uvicorn services.asset_manager.main:app --host 0.0.0.0 --port 8001
    environment:
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://redis:6379/0
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: myroot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanops

  celery-worker:
    build: .
    container_name: scanops-celery-worker
    command: celery -A shared.celery_app worker --loglevel=info --concurrency=10 -Q discovery,vulnerabilities,heavy_scans,scanner_tasks,scanner_orchestrator,celery,ai_reasoning
    environment:
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://redis:6379/0
      OPENVAS_USER: admin
      OPENVAS_PASS: admin
      ZAP_HOST: localhost
      ZAP_PORT: 8080
      OLLAMA_MODEL: "qwen3.5:latest"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanops

  m2:
    build:
      context: .
      dockerfile: Dockerfile.m2
    container_name: scanops-m2
    ports:
      - "8003:8003"
    depends_on:
      m1:
        condition: service_healthy
    environment:
      - M2_PORT=8003
      - M1_URL=http://m1:8001
      - LOG_LEVEL=info
    volumes:
      - ./services/recon_engine:/app/services/recon_engine
    networks:
      - scanops
    restart: unless-stopped
  # services/scanner_engine (M3)
  scanner-engine:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: scanops-scanner-engine
    ports:
      - "8002:8002"
    command: uvicorn services.scanner_engine.main:app --host 0.0.0.0 --port 8002
    environment:
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - scanops

  trivy:
    image: aquasec/trivy:latest
    container_name: scanops-trivy
    ports:
      - "8090:8090"
    command: server --listen 0.0.0.0:8090
    networks:
      - scanops
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8090/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: scanops-zap
    ports:
      - "8080:8080"
    command: zap.sh -config api.disablekey=true -config api.addrs.addr.name='.*' -config api.addrs.addr.regex=true
    volumes:
      - zap_data:/root/.ZAP
    networks:
      - scanops
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:8080/json/core/action/version" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # services/exploit_engine (M4)
  m4:
    build:
      context: .
      dockerfile: Dockerfile.m4
    container_name: scanops-m4
    ports:
      - "8004:8004"
    command: uvicorn services.exploit_engine.main:app --host 0.0.0.0 --port 8004
    environment:
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://redis:6379/0
      MSF_HOST: 10.202.15.254
      MSF_PORT: 55553
      MSF_PASSWORD: scanops123
      NXC_TIMEOUT: 30
      NXC_THREADS: 10
      NXC_DEFAULT_DOMAIN: WORKGROUP
      KILL_SWITCH_REDIS_URL: redis://redis:6379/0
      MONITOR_SSH_USER: admin
      MONITOR_SSH_PASSWORD: test123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - scanops
    restart: unless-stopped

  # services/ai_reasoning (M8)
  m8:
    build:
      context: .
      dockerfile: Dockerfile.m8
    container_name: scanops-m8
    ports:
      - "8005:8005"
    command: uvicorn services.ai_reasoning.main:app --host 0.0.0.0 --port 8005
    environment:
      DATABASE_URL: postgresql://scanops:scanops@postgres:5432/scanops
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen3.5:latest
      M3_URL: http://scanner-engine:8002
      M1_URL: http://m1:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - scanops
    restart: unless-stopped

volumes:
  pgdata:
  trivy_data:
  zap_data:
