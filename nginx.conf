user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Use Docker's embedded DNS so upstream hostnames are re-resolved
    # dynamically on each nginx reload instead of being cached at boot.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Logging with detailed info
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

    # Upstream services with health checks
    upstream m1 {
        least_conn;
        server m1:8001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream m2 {
        least_conn;
        server m2:8003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream m3 {
        least_conn;
        server scanner-engine:8002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream m4 {
        least_conn;
        server m4:8004 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream m5 {
        least_conn;
        server m5:8006 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream m7 {
        least_conn;
        server m7:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream m8 {
        least_conn;
        server m8:8005 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream orchestrator {
        least_conn;
        server orchestrator:8009 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # HTTP redirect to HTTPS
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Main server block
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;

        # SSL Configuration
        ssl_certificate /etc/nginx/certs/localhost+2.pem;
        ssl_certificate_key /etc/nginx/certs/localhost+2-key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

        # CORS Headers (adjust as needed)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        # Frontend (React)
        location / {
            limit_req zone=general burst=20 nodelay;

            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 1d;
            add_header Cache-Control "public, immutable";

            # Single page app - never cache index.html
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }

        # API routes with rate limiting
        location /api/ {
            limit_req zone=api burst=50 nodelay;
        }

        # API M1 - Inventory & Discovery
        location /api/m1/ {
            proxy_pass http://m1/;
            proxy_buffering off;
            include /etc/nginx/proxy_params.conf;
        }

        # API M2 - Network Scanning
        location /api/m2/ {
            proxy_pass http://m2/;
            include /etc/nginx/proxy_params.conf;
        }

        # API M3 - Port Mapping
        location /api/m3/ {
            proxy_pass http://m3/;
            include /etc/nginx/proxy_params.conf;
        }

        # API M4 - Vulnerability Assessment
        location /api/m4/ {
            proxy_pass http://m4/;
            include /etc/nginx/proxy_params.conf;
        }

        # API M5 - Compliance & Configuration
        location /api/m5/ {
            proxy_pass http://m5/;
            include /etc/nginx/proxy_params.conf;
        }

        # API M7 - Surface Management
        location /api/m7/ {
            proxy_pass http://m7/;
            include /etc/nginx/proxy_params.conf;
        }

        # API M8 - Correlation & Intelligence
        location /api/m8/ {
            proxy_pass http://m8/;
            include /etc/nginx/proxy_params.conf;
        }

        # API Orchestrator - Central coordination
        location /api/orchestrator/ {
            proxy_pass http://orchestrator/;
            include /etc/nginx/proxy_params.conf;
        }

        # File uploads - stricter rate limiting
        location ~ ^/api/(m1|m4)/upload {
            limit_req zone=upload burst=10 nodelay;
            proxy_request_buffering on;
            proxy_buffering on;
            client_max_body_size 500M;

            # Dynamic upstream routing
            set $backend "m1";
            if ($uri ~ ^/api/m4/) {
                set $backend "m4";
            }
            proxy_pass http://$backend;
            include /etc/nginx/proxy_params.conf;
        }

        # Health check endpoint (no logging)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Status endpoint for monitoring
        location /status {
            access_log off;
            return 200 "status ok\n";
            add_header Content-Type text/plain;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # 404 - Custom error page
        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        # 5xx errors
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
